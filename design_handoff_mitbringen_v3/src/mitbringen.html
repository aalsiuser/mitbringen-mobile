<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>mitbringen</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%232461ff'/%3E%3Cpath d='M58 44C52 41 49 34 51 27c5 3 9 10 9 17' fill='%23c4ec5a'/%3E%3Cpath d='M35 44a15 12 0 0 1 30 0' stroke='%23fff' stroke-width='5' stroke-linecap='round' fill='none'/%3E%3Cpath d='M23 44h54l-5.4 36A6 6 0 0 1 65.7 85H34.3A6 6 0 0 1 28.4 80L23 44Z' fill='%23fff'/%3E%3Ccircle cx='64' cy='74' r='13' fill='%232fc46f'/%3E%3Cpath d='M58 74l4 4 8-8.5' stroke='%23fff' stroke-width='4.4' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#e9edf4; --surface:#ffffff; --inset:#f4f6fa;
    --ink:#0d1220; --ink2:#586172; --ink3:#9aa3b2;
    --line:#eef1f6; --line2:#e3e8ef;
    --blue:#2461ff; --blue-deep:#1748d8; --blue-soft:#eaf0ff;
    --green:#12a150; --green-soft:#e6f5ec; --green-tint:#f1f9f4;
    --coral:#ff6a4d; --coral-soft:#fff0ec; --violet:#7b61ff; --violet-soft:#f1ecff; --amber:#f5a623; --amber-soft:#fef3c7; --green-tint:#f1f9f4;
    --shadow:0 1px 2px rgba(13,18,32,.04), 0 8px 22px rgba(13,18,32,.06);
    --shadow-card:0 2px 6px rgba(13,18,32,.05), 0 16px 34px -12px rgba(13,18,32,.12);
    --shadow-blue:0 14px 30px -10px rgba(36,97,255,.5);
    --font:"Schibsted Grotesk", system-ui, sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font);background:#d6dce6;color:var(--ink);-webkit-font-smoothing:antialiased;letter-spacing:-0.011em}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input{font-family:inherit}
  .tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
  ::selection{background:var(--blue-soft)}

  .viewport{min-height:100%;display:flex;align-items:center;justify-content:center;padding:26px;
    background:radial-gradient(120% 80% at 50% -10%, #eef2f8 0%, #d6dce6 70%)}
  .app{position:relative;width:400px;height:min(858px,calc(100vh - 52px));background:var(--bg);border-radius:42px;
    box-shadow:0 40px 90px -24px rgba(13,18,32,.42), 0 10px 30px rgba(13,18,32,.12);overflow:hidden;display:flex;flex-direction:column;isolation:isolate}
  .app::after{content:"";position:absolute;inset:0;border-radius:42px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.6);pointer-events:none;z-index:60}

  .screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .screen::-webkit-scrollbar{display:none}
  .pad{padding:0 18px}

  .eyebrow{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3)}
  .card{background:var(--surface);border-radius:22px;box-shadow:var(--shadow-card)}

  /* top bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:22px 20px 12px;flex:0 0 auto}
  .hi-sub{font-size:13px;color:var(--ink2);font-weight:600;white-space:nowrap}
  .hi-name{font-size:22px;font-weight:800;letter-spacing:-0.03em;margin-top:2px;white-space:nowrap}
  .icbtn{width:40px;height:40px;border-radius:50%;background:var(--surface);box-shadow:var(--shadow);display:grid;place-items:center;color:var(--ink)}
  .icbtn:active{transform:scale(.92)}
  .avatar{width:40px;height:40px;border-radius:50%;background:var(--blue);color:#fff;display:grid;place-items:center;font-weight:700;font-size:15px}

  /* savings card */
  .savecard{border-radius:26px;background:linear-gradient(150deg,#2f6bff 0%, #1d4fe6 60%, #1a44c8 100%);color:#fff;padding:22px 22px 20px;position:relative;overflow:hidden;box-shadow:var(--shadow-blue)}
  .savecard .r1{position:absolute;right:-44px;top:-54px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.10)}
  .savecard .r2{position:absolute;right:30px;top:34px;width:84px;height:84px;border-radius:50%;background:rgba(255,255,255,.08)}
  .chip-up{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.18);padding:5px 11px;border-radius:999px;font-size:12.5px;font-weight:700}
  .track{height:8px;border-radius:999px;background:rgba(255,255,255,.25);margin-top:18px;overflow:hidden}
  .track > i{display:block;height:100%;border-radius:999px;background:#fff;transition:width .9s cubic-bezier(.2,.7,.2,1)}
  .save-meta{display:flex;justify-content:space-between;margin-top:10px;font-size:12.5px;font-weight:600}

  /* quick actions */
  .quick{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px}
  .qa{background:var(--surface);border-radius:18px;padding:13px 6px 10px;text-align:center;box-shadow:var(--shadow)}
  .qa:active{transform:scale(.96)}
  .qa .ico{width:38px;height:38px;border-radius:12px;margin:0 auto;display:grid;place-items:center}
  .qa .lbl{font-size:11px;font-weight:600;color:var(--ink2);margin-top:7px;letter-spacing:0}

  .sec{display:flex;align-items:center;justify-content:space-between;margin:22px 4px 12px}
  .sec h3{font-size:16px;font-weight:800;letter-spacing:-0.02em}
  .sec button{font-size:13px;font-weight:700;color:var(--blue)}

  /* list card */
  .lc-go{width:40px;height:40px;border-radius:50%;background:var(--blue);color:#fff;display:grid;place-items:center}
  .dots{display:flex;align-items:center;margin-top:16px}
  .dot{width:32px;height:32px;border-radius:10px;display:grid;place-items:center;font-size:16px;margin-left:-6px;border:2px solid #fff;background:var(--inset)}
  .dot:first-child{margin-left:0}
  .savetag{margin-left:auto;font-size:13px;font-weight:700;color:var(--green);background:var(--green-soft);padding:6px 12px;border-radius:999px}

  /* store rows */
  .srow{display:flex;align-items:center;gap:13px;padding:14px;border-radius:16px;width:100%;text-align:left}
  .srow + .srow{border-top:1px solid var(--line)}
  .smark{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;color:#fff;font-weight:800;font-size:17px;flex:0 0 auto}
  .sname{font-weight:700;font-size:15.5px}
  .smeta{font-size:12.5px;color:var(--ink3);font-weight:600;margin-top:2px}
  .ssave{font-weight:800;font-size:16px;color:var(--green)}

  /* tab bar */
  .tabs{flex:0 0 auto;display:flex;justify-content:space-around;align-items:center;padding:10px 14px calc(18px + env(safe-area-inset-bottom));background:linear-gradient(to top,var(--bg) 72%, rgba(233,237,244,0));border-top:1px solid var(--line2)}
  .tab{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10.5px;font-weight:700;color:var(--ink3);padding:6px 14px;letter-spacing:0}
  .tab.on{color:var(--blue)}
  .tab:active{transform:scale(.92)}

  /* search + items */
  .search{display:flex;align-items:center;gap:10px;height:50px;background:var(--surface);border-radius:15px;padding:0 15px;box-shadow:var(--shadow);transition:box-shadow .15s}
  .search.foc{box-shadow:0 0 0 2px var(--blue), var(--shadow)}
  .search input{border:none;outline:none;flex:1;font-size:15px;font-weight:500;background:transparent;color:var(--ink)}
  .irow{display:flex;align-items:center;gap:13px;background:var(--surface);border-radius:16px;padding:11px 13px;box-shadow:var(--shadow)}
  .ithumb{width:40px;height:40px;border-radius:11px;background:var(--inset);display:grid;place-items:center;font-size:20px;flex:0 0 auto}
  .iname{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .imeta{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink3);font-weight:600;margin-top:3px}
  .sdot{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
  .iprice{font-weight:800;font-size:15.5px}
  .iwas{font-size:11.5px;color:var(--ink3);text-decoration:line-through}

  .btn{height:52px;border-radius:15px;background:var(--blue);color:#fff;width:100%;font-weight:700;font-size:16px;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:var(--shadow-blue)}
  .btn:active{transform:scale(.985)}
  .btn-dark{background:var(--ink);box-shadow:none}

  /* profile */
  .pico{width:40px;height:40px;border-radius:12px;background:var(--inset);color:var(--ink2);display:grid;place-items:center;flex:0 0 auto}
  .prow{display:flex;align-items:center;gap:13px;padding:13px 14px;width:100%;text-align:left}
  .prow + .prow{border-top:1px solid var(--line)}
  .prow:active{transform:scale(.99)}
  .plab{font-size:11.5px;color:var(--ink3);font-weight:600;letter-spacing:0}
  .pval{font-size:15.5px;font-weight:700;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .signout{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;height:54px;margin-top:20px;border-radius:15px;background:var(--surface);box-shadow:var(--shadow);color:var(--coral);font-weight:700;font-size:16px}
  .signout:active{transform:scale(.985)}

  /* bottom sheet */
  .sheet-back{position:absolute;inset:0;background:rgba(13,18,32,.42);z-index:80;display:flex;align-items:flex-end}
  .sheet{background:var(--surface);width:100%;border-radius:28px 28px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));box-shadow:0 -12px 44px rgba(13,18,32,.22)}
  .sfield{width:100%;height:52px;margin-top:8px;border-radius:14px;border:1px solid var(--line2);background:var(--inset);padding:0 15px;font-size:16px;font-weight:600;color:var(--ink);outline:none;transition:box-shadow .15s,border-color .15s}
  .sfield:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft)}

  /* auth */
  .afield{width:100%;height:54px;border-radius:14px;border:1.5px solid var(--line2);background:var(--surface);padding:0 16px;font-size:16px;font-weight:500;color:var(--ink);outline:none;transition:box-shadow .15s,border-color .15s}
  .afield:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft)}
  .afield.bad{border-color:var(--coral)}
  .btn-soft{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}
  .linklike{font-weight:700;color:var(--blue)}

  @keyframes riseIn{from{transform:translateY(10px)}to{transform:none}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes pop{0%{opacity:0;transform:translateX(-50%) scale(.9)}60%{transform:translateX(-50%) scale(1.03)}100%{opacity:1;transform:translateX(-50%) scale(1)}}
  @keyframes sheetUp{from{transform:translateY(100%)}to{transform:none}}
  .aUp{animation:riseIn .45s cubic-bezier(.2,.7,.2,1) both}
  .aIn{animation:fadeIn .3s ease both}
  .aPop{animation:pop .4s cubic-bezier(.2,.8,.2,1) both}
  .aSheet{animation:sheetUp .34s cubic-bezier(.2,.85,.2,1) both}

  @media (max-width:460px){
    .viewport{padding:0}
    .app{width:100%;height:100vh;height:100dvh;border-radius:0}
    .app::after{border-radius:0}
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="gapp.jsx"></script>
</body>
</html>
